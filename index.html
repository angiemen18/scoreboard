<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="team">
                <h3>HOME</h3>
                <div class="score-display" id="home-score">0</div>
                <div class="buttons">
                    <button class="btn" data-team="home" data-points="1">+1</button>
                    <button class="btn" data-team="home" data-points="2">+2</button>
                    <button class="btn" data-team="home" data-points="3">+3</button>
                </div>
            </div>
            <div class="team">
                <h3>GUEST</h3>
                <div class="score-display" id="guest-score">0</div>
                <div class="buttons">
                    <button class="btn" data-team="guest" data-points="1">+1</button>
                    <button class="btn" data-team="guest" data-points="2">+2</button>
                    <button class="btn" data-team="guest" data-points="3">+3</button>
                </div>
            </div>
        </div>
        <script type="module" src="index.js"></script>
    </body>
</html>
